<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تقديم الطلاب - منصة القبول الذكية</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-xl rounded-2xl max-w-lg w-full p-8 border border-gray-100 transition-all">
        <div class="text-center mb-8">
            <div
                class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-sm">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">طلب التحاق بالمدرسة</h1>
            <p class="text-gray-500 text-sm mt-2">يرجى ملء البيانات التالية بدقة للانضمام إلى نظام التقييم</p>
        </div>

        <form id="application-form" class="space-y-6">

            <div>
                <label class="block text-gray-700 font-semibold mb-2 text-sm">الاسم بالكامل (رباعي)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="student-name" required placeholder="أدخل اسمك رباعياً باللغة العربية"
                        class="w-full pr-10 pl-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 text-gray-700 placeholder-gray-400 font-medium">
                </div>
                <p id="name-error" class="text-red-500 text-xs mt-1 hidden font-semibold">يرجى إدخال الاسم رباعياً
                    باللغة العربية فقط.</p>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2 text-sm">المحافظة</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <input type="text" id="student-gov" required placeholder="مثال: القاهرة، الجيزة..."
                        class="w-full pr-10 pl-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 text-gray-700 placeholder-gray-400 font-medium">
                </div>
                <p id="gov-error" class="text-red-500 text-xs mt-1 hidden font-semibold">يرجى إدخال اسم محافظة صحيح
                    باللغة العربية بدون أرقام.</p>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2 text-sm">التخصص المرغوب</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-gears"></i>
                    </span>
                    <select id="student-spec" required
                        class="w-full pr-10 pl-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 text-gray-700 font-medium appearance-none bg-white">
                        <option value="" disabled selected>اختر التخصص المطلوب...</option>
                        <option value="programming">تطوير برمجيات</option>
                        <option value="networking">هندسة شبكات</option>
                        <option value="electronics">إلكترونيات صناعية</option>
                        <option value="telecom">اتصالات ونقل بيانات</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
                <i class="fa-solid fa-paper-plane"></i> إرسال طلب التقديم
            </button>
        </form>
    </div>

    <script type="module" src="js/apply.js"></script>
</body>

</html>
