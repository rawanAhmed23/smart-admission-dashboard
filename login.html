<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8 transition-all hover:shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl mb-4 text-2xl shadow-inner">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">بوابة الإدارة والكنترول</h1>
            <p class="text-sm text-gray-400 mt-1">الرجاء تسجيل الدخول لمتابعة صلاحياتك</p>
        </div>

        <div id="error-alert" class="hidden mb-6 bg-red-50 border-r-4 border-red-500 text-red-700 p-4 rounded-lg text-sm font-semibold flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation text-base"></i>
            <span id="error-message">البريد الإلكتروني أو كلمة المرور غير صحيحة.</span>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="login-email" required placeholder="admin@school.com" 
                           class="w-full pr-10 pl-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-medium text-gray-700 transition-all text-left">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="login-password" required placeholder="••••••••" 
                           class="w-full pr-10 pl-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-medium text-gray-700 transition-all text-left">
                </div>
            </div>

            <button type="submit" id="btn-submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-md shadow-indigo-100 active:scale-[0.98]">
                <span>تسجيل الدخول</span>
                <i class="fa-solid fa-arrow-left-to-bracket text-sm"></i>
            </button>
        </form>

        <div class="text-center mt-6 border-t border-slate-100 pt-4">
            <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-indigo-600 transition-all inline-flex items-center gap-2 group">
                <i class="fa-solid fa-house text-xs group-hover:scale-110 transition-all"></i> 
                <span>العودة للقائمة الرئيسية</span>
                <i class="fa-solid fa-arrow-left text-xs opacity-0 group-hover:opacity-100 group-hover:translate-x-[-4px] transition-all"></i>
            </a>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
