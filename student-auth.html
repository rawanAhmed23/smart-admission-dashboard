<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المتقدمين والطلاب - منصة القبول الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8 transition-all hover:shadow-2xl">
        
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl mb-4 text-2xl shadow-inner">
                <i class="fa-solid fa-user-graduate"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">بوابة المتقدمين والطلاب</h1>
            <p class="text-sm text-gray-400 mt-1">مرحباً بك في منصة اختبارات القبول الذكية</p>
        </div>

        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button id="tab-login" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-white text-purple-600 shadow-sm">
                تسجيل الدخول
            </button>
            <button id="tab-signup" class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-gray-500 hover:text-gray-700">
                إنشاء حساب جديد
            </button>
        </div>

        <div id="auth-alert" class="hidden mb-6 p-4 rounded-lg text-sm font-semibold flex items-center gap-2 border-r-4">
            <i id="alert-icon" class="fa-solid text-base"></i>
            <span id="alert-message"></span>
        </div>

        <form id="student-login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="login-email" required placeholder="student@example.com" 
                           class="w-full pr-10 pl-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 font-medium text-gray-700 transition-all text-left">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="login-password" required placeholder="••••••••" 
                           class="w-full pr-10 pl-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 font-medium text-gray-700 transition-all text-left">
                </div>
            </div>

            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-md shadow-purple-100 active:scale-[0.98]">
                <span>دخول المنصة</span>
                <i class="fa-solid fa-arrow-left-to-bracket text-sm"></i>
            </button>
        </form>

        <form id="student-signup-form" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">الاسم بالكامل (رباعي)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="signup-name" required placeholder="محمد أحمد علي..." 
                           class="w-full pr-10 pl-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 font-medium text-gray-700 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="signup-email" required placeholder="name@example.com" 
                           class="w-full pr-10 pl-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 font-medium text-gray-700 transition-all text-left">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">رقم الهاتف</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <input type="tel" id="signup-phone" required placeholder="01xxxxxxxxx" 
                           class="w-full pr-10 pl-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 font-medium text-gray-700 transition-all text-left">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">التخصص المطلوب للالتحاق</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 pointer-events-none">
                        <i class="fa-solid fa-laptop-code"></i>
                    </span>
                    <select id="signup-spec" required 
                            class="w-full pr-10 pl-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 font-medium text-gray-700 transition-all appearance-none bg-white">
                        <option value="" disabled selected>اختر التخصص البرمجي/الفني</option>
                        <option value="programming">تطوير برمجيات (Software Development)</option>
                        <option value="networking">هندسة شبكات (Computer Networking)</option>
                        <option value="electronics">لكترونيات صناعيه (Computer Electronics)</option>
                        <option value="telecom">اتصالات ونقل بيانات (Communication and Data Transmission)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="signup-password" required placeholder="لا تقل عن 6 أحرف" 
                           class="w-full pr-10 pl-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 font-medium text-gray-700 transition-all text-left">
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-md shadow-emerald-100 active:scale-[0.98] mt-2">
                <span>تأكيد تسجيل البيانات</span>
                <i class="fa-solid fa-user-plus text-sm"></i>
            </button>
        </form>

    </div>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const loginForm = document.getElementById('student-login-form');
        const signupForm = document.getElementById('student-signup-form');

        tabLogin.addEventListener('click', () => {
            tabLogin.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-white text-purple-600 shadow-sm";
            tabSignup.className = "flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-gray-500 hover:text-gray-700";
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        });

        tabSignup.addEventListener('click', () => {
            tabSignup.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-white text-emerald-600 shadow-sm";
            tabLogin.className = "flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-gray-500 hover:text-gray-700";
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });
    </script>

    <script type="module" src="js/student-auth.js"></script>
</body>
</html>
